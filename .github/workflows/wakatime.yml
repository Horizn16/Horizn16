name: WakaTime and Year Progress
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  update-readme:
    name: Update Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Update Year Progress
        uses: imkasen/time-progress-bar@main
        with:
          TIME_ZONE: +5.5

      - name: Update WakaTime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "YES"
          SHOW_PROJECTS: "NO"
          SHOW_TIMEZONE: "YES"
          SHOW_EDITORS: "YES"
          SHOW_LANGUAGE_PER_REPO: "YES"
          SHOW_LINES_OF_CODE: "YES"
          SHOW_PROFILE_VIEWS: "YES"
          SHOW_SHORT_INFO: "YES"
          SHOW_DAYS_OF_WEEK: "YES"
          SHOW_TOTAL_CODE_TIME: "YES"
          SECTION_NAME: "waka"
